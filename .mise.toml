# Development environment for the Helen Energy Consumption HACS component.
# `mise install` installs the pinned tools and then runs `uv sync` (postinstall
# hook), so a single command brings the whole dev environment up.

[tools]
python = "3.12"
uv = "0.11.26"

[hooks]
# Runs after tools are installed; does not require `mise activate`.
# --frozen installs exactly from the committed uv.lock (reproducible).
postinstall = "uv sync --frozen"

[tasks.verify]
description = "Full lint + format + test gate (run before opening a PR)"
run = [
    "uv run ruff check custom_components tests",
    "uv run ruff format --check custom_components tests",
    "uv run mypy custom_components",
    "uv run pytest tests/",
]
