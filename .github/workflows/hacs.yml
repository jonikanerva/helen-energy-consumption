name: HACS

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      # No checkout step: hacs/action fetches the repository itself
      # (per https://hacs.xyz/docs/publish/action/).
      - uses: hacs/action@main
        with:
          category: integration
          # helen_energy_consumption is not in home-assistant/brands; kept
          # ignored per the decision recorded in issue #33; revisit on HACS
          # default-store submission.
          ignore: brands
